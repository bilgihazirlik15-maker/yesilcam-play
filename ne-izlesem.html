<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ne İzlesem? | Yeşilçam Filmleri</title>
  <meta name="description" content="Yeşilçam arşivinden rastgele bir film önerisi alın; afiş, yıl, yönetmen ve oyuncu bilgileriyle hızlıca seçim yapın." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://yesilcamarsivi.com/ne-izlesem.html" />
  <meta property="og:locale" content="tr_TR" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Yeşilçam Filmleri" />
  <meta property="og:title" content="Ne İzlesem? | Yeşilçam Filmleri" />
  <meta property="og:description" content="Kararsız kaldığınızda Yeşilçam arşivinden rastgele bir film önerisi alın." />
  <meta property="og:url" content="https://yesilcamarsivi.com/ne-izlesem.html" />
  <meta property="og:image" content="https://yesilcamarsivi.com/logo.png" />
  <meta property="og:image:alt" content="Yeşilçam Filmleri logosu" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Ne İzlesem? | Yeşilçam Filmleri" />
  <meta name="twitter:description" content="Yeşilçam arşivinden rastgele bir film önerisi alın." />
  <meta name="twitter:image" content="https://yesilcamarsivi.com/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --surface: rgba(255,255,255,0.06);
      --line: rgba(255,255,255,0.12);
      --text: #f6f1e8;
      --muted: #d5cbbb;
      --accent: #c8a46a;
      --max-width: 1200px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at top, rgba(200,164,106,0.10), transparent 26%),
        linear-gradient(180deg, #171313 0%, #110f0f 100%);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: min(var(--max-width), 92%);
      margin: 0 auto;
    }

    .site-header {
      border-bottom: 1px solid var(--line);
      background: rgba(17,15,15,0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 0 16px;
      gap: 14px;
    }

    .header-top {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      user-select: none;
    }

    .brand-logo {
      width: 84px;
      height: 84px;
      object-fit: contain;
      display: block;
      flex-shrink: 0;
    }

    .brand-name {
      font-family: "Cinzel", serif;
      font-size: clamp(2rem, 4vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--text);
    }

    .main-nav {
      width: 100%;
    }

    .main-nav ul {
      display: flex;
      justify-content: center;
      gap: 42px;
      list-style: none;
      flex-wrap: wrap;
    }

    .main-nav a {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 1rem;
      letter-spacing: 0.08em;
      border-bottom: 1px solid transparent;
      padding-bottom: 9px;
      transition: 0.2s;
    }

    .main-nav a.active,
    .main-nav a:hover {
      color: var(--text);
      border-bottom-color: var(--accent);
    }

    main {
      padding: 36px 4vw;
    }

    .draw-container {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 40px;
      max-width: 1100px;
      margin: auto;
      align-items: center;
    }

    .poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.95rem;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .info {
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .fade-out {
      opacity: 0.25;
      transform: translateY(8px);
    }

    .badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 7px 13px;
      border-radius: 999px;
      background: rgba(200,164,106,0.16);
      border: 1px solid rgba(200,164,106,0.34);
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .info h1 {
      font-family: "Cinzel", serif;
      font-size: 2.4rem;
      margin-bottom: 16px;
      line-height: 1.15;
    }

    .meta {
      background: var(--surface);
      border: 1px solid var(--line);
      padding: 18px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
    }

    .meta div {
      margin-bottom: 8px;
      color: var(--muted);
    }

    .meta div:last-child {
      margin-bottom: 0;
    }

    .meta strong {
      color: var(--accent);
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--accent);
      color: #1b1611;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      border: none;
      display: inline-block;
      font-size: 1rem;
      font-weight: 500;
      transition: transform 0.25s ease, filter 0.25s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    #goBtn {
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.5s ease, filter 0.25s ease;
    }

    #goBtn.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .message {
      margin-top: 15px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 860px) {
      .main-nav ul {
        gap: 18px;
      }
    }

    @media (max-width: 768px) {
      .draw-container {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .poster {
        max-width: 260px;
        margin: 0 auto;
      }

      .buttons {
        justify-content: center;
      }
    }

    @media (max-width: 560px) {
      .brand-name {
        font-size: 1.45rem;
      }

      .brand-logo {
        width: 58px;
        height: 58px;
      }
    }
  </style>
</head>

<body>

<header class="site-header">
  <div class="container header-inner">
    <div class="header-top">
      <a href="index.html" class="brand" id="secretBrandLink">
        <img src="logo.png" alt="Yeşilçam Filmleri logosu" class="brand-logo">
        <div class="brand-name">Yeşilçam Filmleri</div>
      </a>
    </div>

    <nav class="main-nav">
      <ul>
        <li><a href="index.html">Ana Sayfa</a></li>
        <li><a href="film-arama.html">Film Arama</a></li>
        <li><a class="active" href="ne-izlesem.html">Ne İzlesem?</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <div class="draw-container">

    <div class="poster" id="posterBox">
      <span id="posterPlaceholder">Afiş burada görünecek</span>
      <img id="posterImg" alt="Film afişi">
    </div>

    <div class="info" id="infoBox">
      <span class="badge">Bugünün Önerisi</span>

      <h1 id="filmTitle">Yükleniyor...</h1>

      <div class="meta" id="filmMeta">
        <div><strong>Yıl:</strong> <span id="year">-</span></div>
        <div><strong>Yönetmen:</strong> <span id="director">-</span></div>
        <div><strong>Oyuncular:</strong> <span id="actors">-</span></div>
      </div>

      <div class="buttons">
        <button class="btn" type="button" onclick="drawFilm(true)">Film Seç</button>
        <button class="btn" type="button" onclick="drawFilm(true)">Yeniden Dene</button>
        <a id="goBtn" class="btn" href="#">Sayfaya Git</a>
      </div>

      <div id="msg" class="message"></div>
    </div>

  </div>
</main>

<script>
  const URL = "https://script.google.com/macros/s/AKfycbxAO9iNli2uvZNySvsdMaSRRP9ogdLvLmgz_3AKc6jjl-3tRFNGjgT9y0V0EaXn07Xt/exec";

  let films = [];
  let isDrawing = false;

  async function loadFilms() {
    try {
      const res = await fetch(URL + "?t=" + Date.now());
      const data = await res.json();

      if (Array.isArray(data)) {
        films = data;
      } else {
        films = data.movies || data.films || data.data || [];
      }
    } catch (error) {
      document.getElementById("msg").textContent = "Veriler alınamadı. Apps Script bağlantısını kontrol edin.";
    }
  }

  function getRandomFilm() {
    return films[Math.floor(Math.random() * films.length)];
  }

  function extractUrl(value) {
    const text = String(value || "").trim();
    if (!text) return "";

    const quotedUrlMatch = text.match(/["'](https?:\/\/[^"']+|www\.[^"']+)["']/i);
    if (quotedUrlMatch) return quotedUrlMatch[1];

    const plainUrlMatch = text.match(/https?:\/\/[^\s,)]+|www\.[^\s,)]+/i);
    return plainUrlMatch ? plainUrlMatch[0] : text;
  }

  function getSafeUrl(value) {
    const extractedUrl = extractUrl(value);
    if (!extractedUrl) return "";

    const normalizedUrl = extractedUrl.startsWith("www.")
      ? `https://${extractedUrl}`
      : extractedUrl;

    try {
      const url = new URL(normalizedUrl, window.location.href);
      return ["http:", "https:"].includes(url.protocol) ? url.href : "";
    } catch (error) {
      return "";
    }
  }

  function getPosterUrlCandidatesFromValue(value) {
    const safeUrl = getSafeUrl(value);
    if (!safeUrl) return [];

    try {
      const url = new URL(safeUrl);
      const driveFileMatch = url.pathname.match(/\/file\/d\/([^/]+)/);
      const driveId = url.hostname.includes("drive.google.com")
        ? url.searchParams.get("id") || (driveFileMatch ? driveFileMatch[1] : "")
        : "";

      if (driveId) {
        const encodedDriveId = encodeURIComponent(driveId);
        return Array.from(new Set([
          safeUrl,
          `https://drive.google.com/thumbnail?id=${encodedDriveId}&sz=w1000`,
          `https://drive.google.com/uc?export=view&id=${encodedDriveId}`,
          `https://lh3.googleusercontent.com/d/${encodedDriveId}=w1000`
        ]));
      }

      return [safeUrl];
    } catch (error) {
      return [safeUrl];
    }
  }

  function getYouTubeThumbnailUrl(value) {
    const safeUrl = getSafeUrl(value);
    if (!safeUrl) return "";

    try {
      const url = new URL(safeUrl);
      const hostname = url.hostname.replace(/^www\./, "");
      let videoId = "";

      if (["youtube.com", "m.youtube.com"].includes(hostname) && url.pathname === "/watch") {
        videoId = url.searchParams.get("v") || "";
      }

      if (hostname === "youtu.be") {
        videoId = url.pathname.split("/").filter(Boolean)[0] || "";
      }

      return videoId ? `https://img.youtube.com/vi/${encodeURIComponent(videoId)}/hqdefault.jpg` : "";
    } catch (error) {
      return "";
    }
  }

  function isYouTubeUrl(value) {
    const safeUrl = getSafeUrl(value);
    if (!safeUrl) return false;

    try {
      const hostname = new URL(safeUrl).hostname.replace(/^www\./, "");
      return ["youtube.com", "m.youtube.com", "youtu.be", "youtube-nocookie.com"].includes(hostname);
    } catch (error) {
      return false;
    }
  }

  function getPosterUrls(film) {
    const movie = film || {};
    const posterFields = [
      "poster",
      "posterUrl",
      "posterURL",
      "poster_url",
      "posterLink",
      "poster_link",
      "Poster",
      "Poster URL",
      "Poster Link",
      "image",
      "imageUrl",
      "imageURL",
      "image_url",
      "Image",
      "Image URL",
      "img",
      "afis",
      "afiş",
      "afisUrl",
      "afişUrl",
      "afisLink",
      "afişLink",
      "Afiş",
      "Afiş URL",
      "Afis URL",
      "Afiş Linki",
      "Afis Linki",
      "gorsel",
      "görsel",
      "Görsel",
      "Görsel URL",
      "resim",
      "resimUrl",
      "resimLink",
      "Resim",
      "Resim URL",
      "Resim Linki"
    ];

    for (const field of posterFields) {
      const posterUrls = getPosterUrlCandidatesFromValue(movie[field]);
      if (posterUrls.length) return posterUrls;
    }

    const posterKeyPattern = /(poster|image|img|afis|afiş|gorsel|görsel|resim)/i;
    for (const [key, value] of Object.entries(movie)) {
      if (!posterKeyPattern.test(key)) continue;

      const posterUrls = getPosterUrlCandidatesFromValue(value);
      if (posterUrls.length) return posterUrls;
    }

    for (const [key, value] of Object.entries(movie)) {
      if (isYouTubeUrl(value) || /youtube/i.test(key)) continue;

      const posterUrls = getPosterUrlCandidatesFromValue(value);
      if (posterUrls.length) return posterUrls;
    }

    const youtubeThumbnailUrl = getYouTubeThumbnailUrl(movie.youtube || movie.youtubeUrl || movie.youtubeURL || movie["YouTube URL"]);
    return youtubeThumbnailUrl ? [youtubeThumbnailUrl] : [];
  }

  function showPosterPlaceholder() {
    const posterBox = document.getElementById("posterBox");
    const posterImg = document.getElementById("posterImg");
    const posterPlaceholder = document.getElementById("posterPlaceholder");

    posterBox.style.backgroundImage = "none";
    posterImg.removeAttribute("src");
    posterImg.style.display = "none";
    posterPlaceholder.style.display = "block";
  }

  function showPosterImage(urls, title) {
    const posterBox = document.getElementById("posterBox");
    const posterImg = document.getElementById("posterImg");
    const posterPlaceholder = document.getElementById("posterPlaceholder");
    const posterUrls = Array.isArray(urls) ? urls.filter(Boolean) : [urls].filter(Boolean);
    let activeIndex = 0;

    function applyPoster(url) {
      posterBox.style.backgroundImage = `url("${url}")`;
      posterPlaceholder.style.display = "none";
      posterImg.style.display = "none";
      posterImg.alt = `${title || "Film"} afişi`;
      posterImg.src = url;
    }

    posterImg.onload = function () {
      posterImg.style.display = "block";
      posterPlaceholder.style.display = "none";
    };

    posterImg.onerror = function () {
      activeIndex++;

      if (activeIndex < posterUrls.length) {
        applyPoster(posterUrls[activeIndex]);
        return;
      }

      posterImg.removeAttribute("src");
      posterImg.style.display = "none";
      posterPlaceholder.style.display = "none";
    };

    applyPoster(posterUrls[activeIndex]);

    if (posterImg.complete && posterImg.naturalWidth > 0) {
      posterImg.onload();
    }
  }

  function applyFilm(f) {
    document.getElementById("filmTitle").textContent = f.title || "İsimsiz Film";
    document.getElementById("year").textContent = f.year || "-";
    document.getElementById("director").textContent = f.director || "-";
    document.getElementById("actors").textContent = f.actors || "-";
    document.getElementById("filmMeta").style.display = "block";

    const posterUrls = getPosterUrls(f);

    if (posterUrls.length) {
      showPosterImage(posterUrls, f.title);
    } else {
      showPosterPlaceholder();
    }

    const goBtn = document.getElementById("goBtn");
    goBtn.classList.remove("show");

    setTimeout(() => {
      goBtn.classList.add("show");
    }, 160);

    goBtn.href = "movie.html?id=" + encodeURIComponent(f.id);
    document.getElementById("msg").textContent = "";
  }

  function drawFilm(withAnimation = false) {
    if (isDrawing) return;

    if (!films.length) {
      loadFilms().then(() => drawFilm(withAnimation));
      return;
    }

    isDrawing = true;

    const infoBox = document.getElementById("infoBox");
    const posterBox = document.getElementById("posterBox");
    const goBtn = document.getElementById("goBtn");

    goBtn.classList.remove("show");

    if (!withAnimation) {
      const f = getRandomFilm();
      applyFilm(f);
      isDrawing = false;
      return;
    }

    let count = 0;
    const maxCount = 18;

    const slotInterval = setInterval(() => {
      const tempFilm = getRandomFilm();

      document.getElementById("filmTitle").textContent = tempFilm.title || "İsimsiz Film";
      document.getElementById("year").textContent = tempFilm.year || "-";
      document.getElementById("director").textContent = tempFilm.director || "-";
      document.getElementById("actors").textContent = tempFilm.actors || "-";
      document.getElementById("filmMeta").style.display = "block";

      count++;

      if (count >= maxCount) {
        clearInterval(slotInterval);

        infoBox.classList.add("fade-out");
        posterBox.classList.add("fade-out");

        setTimeout(() => {
          const finalFilm = getRandomFilm();
          applyFilm(finalFilm);

          infoBox.classList.remove("fade-out");
          posterBox.classList.remove("fade-out");

          isDrawing = false;
        }, 280);
      }
    }, 70);
  }

  loadFilms().then(() => {
    drawFilm(false);
  });

  let secretClickCount = 0;
  let secretClickTimer = null;

  document.getElementById("secretBrandLink").addEventListener("click", function (e) {
    e.preventDefault();

    secretClickCount++;

    if (secretClickCount === 5) {
      sessionStorage.setItem("secretAdminEntry", "allowed");
      window.location.href = "admin.html";
      return;
    }

    clearTimeout(secretClickTimer);
    secretClickTimer = setTimeout(() => {
      secretClickCount = 0;
    }, 2000);
  });
</script>

</body>
</html>
