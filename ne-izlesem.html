<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ne İzlesem? | Yeşilçam Arşivi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="netflix.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html"><img src="logo.png" alt="" />Yeşilçam Arşivi</a>
        <nav class="nav" aria-label="Ana menü">
          <a href="index.html">Ana Sayfa</a>
          <a href="film-arama.html">Filmler</a>
          <a class="active" href="ne-izlesem.html">Ne İzlesem?</a>
          <a href="oyuncular.html">Oyuncular</a>
        </nav>
        <input class="quick-search" data-quick-search type="search" placeholder="Film ara" />
      </div>
    </header>
    <section class="hero" data-hero>
      <div class="hero-content">
        <div class="kicker">Bugünün Seçimi</div>
        <h1 data-hero-title>Film seçiliyor</h1>
        <p class="hero-copy" data-hero-copy>Arşivden rastgele bir öneri hazırlanıyor.</p>
        <div class="meta-line" data-hero-meta></div>
        <div class="actions">
          <a class="btn primary" data-hero-play href="#">İzle</a>
          <a class="btn ghost" data-hero-youtube href="#" target="_blank" rel="noopener noreferrer" hidden>YouTube</a>
          <button class="btn ghost" id="shuffleBtn" type="button">Başka Seç</button>
        </div>
      </div>
    </section>
    <main class="content">
      <section class="row">
        <div class="row-head">
          <h2>Rastgele Alternatifler</h2>
          <span class="row-note">Kararsız kalınca iyi gelir</span>
        </div>
        <div class="rail" id="randomRail"></div>
      </section>
    </main>
    <footer class="footer">Yeşilçam Arşivi</footer>
  </div>
  <script src="netflix.js"></script>
  <script>
    let movies = [];
    function chooseMovie() {
      const selected = sampleMovies(movies, 1)[0];
      setHero(selected);
      renderRail(document.getElementById("randomRail"), sampleMovies(movies, Math.min(18, movies.length)));
    }
    async function initPicker() {
      movies = await getMovies();
      setupQuickSearch(movies);
      chooseMovie();
      document.getElementById("shuffleBtn").addEventListener("click", chooseMovie);
    }
    initPicker().catch(() => {
      document.querySelector("[data-hero-copy]").textContent = "Arşiv verisi alınamadı.";
    });
  </script>
</body>
</html>
