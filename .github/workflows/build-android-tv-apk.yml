name: Build Android TV APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android-tv-app/**"
      - ".github/workflows/build-android-tv-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        working-directory: android-tv-app
        run: gradle :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: yesilcam-arsivi-tv-apk
          path: android-tv-app/app/build/outputs/apk/debug/app-debug.apk
