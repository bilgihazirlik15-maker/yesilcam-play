<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filmler | Yeşilçam Arşivi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="netflix.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html"><img src="logo.png" alt="" />Yeşilçam Arşivi</a>
        <nav class="nav" aria-label="Ana menü">
          <a href="index.html">Ana Sayfa</a>
          <a class="active" href="film-arama.html">Filmler</a>
          <a href="ne-izlesem.html">Ne İzlesem?</a>
          <a href="oyuncular.html">Oyuncular</a>
        </nav>
        <input class="quick-search" data-quick-search type="search" placeholder="Film ara" />
      </div>
    </header>

    <main class="content">
      <h1 class="page-title">Filmler</h1>
      <p class="muted">Başlık, oyuncu, yönetmen, dönem ve türe göre arşivde gezinin.</p>
      <section class="controls" aria-label="Film filtreleri">
        <input id="queryInput" type="search" placeholder="Film adı, oyuncu veya yönetmen" />
        <select id="genreFilter"><option value="">Tüm Türler</option></select>
        <select id="yearFilter"><option value="">Tüm Yıllar</option></select>
        <select id="periodFilter"><option value="">Tüm Dönemler</option></select>
        <select id="actorFilter"><option value="">Tüm Oyuncular</option></select>
        <button class="btn ghost" id="clearBtn" type="button">Temizle</button>
      </section>
      <section class="row">
        <div class="row-head">
          <h2>Sonuçlar</h2>
          <span class="row-note" id="resultCount"></span>
        </div>
        <div class="wide-grid" id="resultsGrid"></div>
        <div class="empty" id="emptyState" hidden>Uygun film bulunamadı.</div>
      </section>
    </main>
    <footer class="footer">Yeşilçam Arşivi</footer>
  </div>

  <script src="netflix.js"></script>
  <script>
    const queryInput = document.getElementById("queryInput");
    const genreFilter = document.getElementById("genreFilter");
    const yearFilter = document.getElementById("yearFilter");
    const periodFilter = document.getElementById("periodFilter");
    const actorFilter = document.getElementById("actorFilter");
    const resultCount = document.getElementById("resultCount");
    const resultsGrid = document.getElementById("resultsGrid");
    const emptyState = document.getElementById("emptyState");
    let allMovies = [];
    function fillOptions(select, values) {
      values.forEach((value) => {
        const option = document.createElement("option");
        option.value = normalizeText(value);
        option.textContent = value;
        select.appendChild(option);
      });
    }
    function applyFilters() {
      const query = normalizeText(queryInput.value);
      const genre = genreFilter.value;
      const year = yearFilter.value;
      const period = periodFilter.value;
      const actor = actorFilter.value;
      const filtered = allMovies.filter((movie) => {
        const haystack = normalizeText([movie.title, movie.actors, movie.director].filter(Boolean).join(" "));
        const actors = String(movie.actors || "").split(",").map(normalizeText);
        return (!query || haystack.includes(query)) && (!genre || normalizeText(movie.genre) === genre) && (!year || normalizeText(movie.year) === year) && (!period || normalizeText(movie.period) === period) && (!actor || actors.includes(actor));
      });
      resultsGrid.replaceChildren(...filtered.map(createMovieCard));
      resultCount.textContent = `${filtered.length} film`;
      emptyState.hidden = filtered.length > 0;
    }
    async function initSearch() {
      allMovies = await getMovies();
      setupQuickSearch(allMovies);
      fillOptions(genreFilter, uniqueValues(allMovies, "genre"));
      fillOptions(yearFilter, uniqueValues(allMovies, "year").sort((a, b) => Number(a) - Number(b)));
      fillOptions(periodFilter, uniqueValues(allMovies, "period"));
      fillOptions(actorFilter, uniqueValues(allMovies, "actors", true));
      [queryInput, genreFilter, yearFilter, periodFilter, actorFilter].forEach((control) => control.addEventListener("input", applyFilters));
      document.getElementById("clearBtn").addEventListener("click", () => {
        queryInput.value = "";
        genreFilter.value = "";
        yearFilter.value = "";
        periodFilter.value = "";
        actorFilter.value = "";
        applyFilters();
      });
      applyFilters();
    }
    initSearch().catch(() => {
      emptyState.hidden = false;
      emptyState.textContent = "Arşiv verisi alınamadı.";
    });
  </script>
</body>
</html>
