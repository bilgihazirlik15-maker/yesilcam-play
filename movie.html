<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Film | Yeşilçam Arşivi</title>
  <meta name="description" content="Yeşilçam Arşivi film detay sayfası." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="netflix.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html"><img src="logo.png" alt="" />Yeşilçam Arşivi</a>
        <nav class="nav" aria-label="Ana menü">
          <a href="index.html">Ana Sayfa</a>
          <a href="film-arama.html">Filmler</a>
          <a href="ne-izlesem.html">Ne İzlesem?</a>
          <a href="oyuncular.html">Oyuncular</a>
        </nav>
        <input class="quick-search" data-quick-search type="search" placeholder="Film ara" />
      </div>
    </header>

    <main class="content">
      <section class="detail-layout" id="detail" hidden>
        <div class="detail-poster" id="detailPoster"></div>
        <div class="detail-copy">
          <div class="kicker">Film Detayı</div>
          <h1 id="title"></h1>
          <div class="meta-line" id="meta"></div>
          <p class="description" id="description"></p>
          <div class="actions" id="actions"></div>
          <div class="fact-grid" id="facts"></div>
        </div>
      </section>
      <section class="row" id="playerSection" hidden>
        <div class="row-head">
          <h2>Oynatıcı</h2>
          <span class="row-note">YouTube bağlantısından gömülü oynatılır</span>
        </div>
        <iframe class="player" id="player" allowfullscreen loading="lazy" title="Film oynatıcı"></iframe>
      </section>
      <section class="row" id="similarSection" hidden>
        <div class="row-head">
          <h2>Benzer Filmler</h2>
          <span class="row-note">Tür ve oyuncu yakınlığına göre</span>
        </div>
        <div class="rail" id="similarRail"></div>
      </section>
      <div class="empty" id="notFound" hidden>Film bulunamadı.</div>
    </main>
    <footer class="footer">Yeşilçam Arşivi</footer>
  </div>

  <script src="netflix.js"></script>
  <script>
    function getMovieId() {
      return new URLSearchParams(window.location.search).get("id") || "";
    }
    function renderFact(label, value) {
      if (!value) return null;
      const item = document.createElement("div");
      item.className = "fact";
      const span = document.createElement("span");
      span.textContent = label;
      item.append(span, document.createTextNode(value));
      return item;
    }
    function getSimilar(movie, movies) {
      const genre = normalizeText(movie.genre);
      const actors = String(movie.actors || "").split(",").map(normalizeText).filter(Boolean);
      return movies.filter((item) => String(item.id) !== String(movie.id)).map((item) => {
        const itemActors = String(item.actors || "").split(",").map(normalizeText).filter(Boolean);
        const score = (genre && normalizeText(item.genre) === genre ? 4 : 0) + itemActors.filter((actor) => actors.includes(actor)).length;
        return { item, score };
      }).filter(({ score }) => score > 0).sort((a, b) => b.score - a.score).slice(0, 14).map(({ item }) => item);
    }
    async function initMovie() {
      const movies = await getMovies();
      setupQuickSearch(movies);
      const movie = movies.find((item) => String(item.id) === String(getMovieId()));
      if (!movie) {
        document.getElementById("notFound").hidden = false;
        return;
      }
      document.title = `${movie.title || "Film"} | Yeşilçam Arşivi`;
      document.getElementById("detail").hidden = false;
      document.getElementById("detailPoster").style.backgroundImage = `url("${getMoviePoster(movie)}")`;
      document.getElementById("title").textContent = movie.title || "İsimsiz Film";
      document.getElementById("description").textContent = shortDescription(movie);
      const meta = document.getElementById("meta");
      meta.replaceChildren(...[movie.year, movie.genre, movie.period].filter(Boolean).map((value) => {
        const item = document.createElement("span");
        item.className = "tag";
        item.textContent = value;
        return item;
      }));
      const actions = document.getElementById("actions");
      const youtube = getYouTubeUrl(movie.youtube || movie.youtubeUrl || movie.youtubeURL);
      if (youtube) {
        const open = document.createElement("a");
        open.className = "btn primary";
        open.href = youtube;
        open.target = "_blank";
        open.rel = "noopener noreferrer";
        open.textContent = "YouTube'da Aç";
        actions.appendChild(open);
      }
      const back = document.createElement("a");
      back.className = "btn ghost";
      back.href = "film-arama.html";
      back.textContent = "Filmlere Dön";
      actions.appendChild(back);
      const facts = [renderFact("Yönetmen", movie.director), renderFact("Oyuncular", movie.actors), renderFact("Dönem", movie.period), renderFact("Tür", movie.genre)].filter(Boolean);
      document.getElementById("facts").replaceChildren(...facts);
      const embed = getEmbedUrl(movie.youtube || movie.youtubeUrl || movie.youtubeURL);
      if (embed) {
        document.getElementById("playerSection").hidden = false;
        document.getElementById("player").src = embed;
      }
      const similar = getSimilar(movie, movies);
      if (similar.length) {
        document.getElementById("similarSection").hidden = false;
        renderRail(document.getElementById("similarRail"), similar);
      }
    }
    initMovie().catch(() => {
      document.getElementById("notFound").hidden = false;
      document.getElementById("notFound").textContent = "Arşiv verisi alınamadı.";
    });
  </script>
</body>
</html>
