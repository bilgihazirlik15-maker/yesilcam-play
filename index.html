<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yeşilçam Arşivi | Film Arşivi</title>
  <meta name="description" content="Yeşilçam filmlerini Netflix tarzı bir arayüzle keşfedin, arayın ve izleme bağlantılarına ulaşın." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="netflix.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="index.html"><img src="logo.png" alt="" />Yeşilçam Arşivi</a>
        <nav class="nav" aria-label="Ana menü">
          <a class="active" href="index.html">Ana Sayfa</a>
          <a href="film-arama.html">Filmler</a>
          <a href="ne-izlesem.html">Ne İzlesem?</a>
          <a href="oyuncular.html">Oyuncular</a>
        </nav>
        <input class="quick-search" data-quick-search type="search" placeholder="Film ara" />
      </div>
    </header>

    <section class="hero" data-hero>
      <div class="hero-content">
        <div class="kicker">Yeşilçam Orijinali</div>
        <h1 data-hero-title>Yeşilçam Arşivi</h1>
        <p class="hero-copy" data-hero-copy>Arşiv yükleniyor.</p>
        <div class="meta-line" data-hero-meta></div>
        <div class="actions">
          <a class="btn primary" data-hero-play href="film-arama.html">Oynat</a>
          <a class="btn ghost" data-hero-youtube href="#" target="_blank" rel="noopener noreferrer" hidden>YouTube</a>
          <a class="btn ghost" href="film-arama.html">Tüm Filmler</a>
        </div>
      </div>
    </section>

    <main class="content" id="rows">
      <section class="row">
        <div class="row-head">
          <h2>Arşivden Öne Çıkanlar</h2>
          <span class="row-note" id="movieCount"></span>
        </div>
        <div class="rail" id="featuredRail"></div>
      </section>
    </main>

    <footer class="footer">Yeşilçam Arşivi, mevcut arşiv verisini bozmadan Netflix tarzı bir sunum olarak hazırlanmıştır.</footer>
  </div>

  <script src="netflix.js"></script>
  <script>
    async function initHome() {
      const rows = document.getElementById("rows");
      const movies = await getMovies();
      setupQuickSearch(movies);
      document.getElementById("movieCount").textContent = `${movies.length} film`;
      const posterMovies = movies.filter((movie) => getMoviePoster(movie) !== FALLBACK_IMAGE);
      const heroMovie = sampleMovies(posterMovies.length ? posterMovies : movies, 1)[0];
      setHero(heroMovie);
      renderRail(document.getElementById("featuredRail"), sampleMovies(movies, Math.min(16, movies.length)));
      groupByGenre(movies).slice(0, 8).forEach(([genre, items]) => {
        const section = document.createElement("section");
        section.className = "row";
        const head = document.createElement("div");
        head.className = "row-head";
        const title = document.createElement("h2");
        title.textContent = genre;
        const note = document.createElement("span");
        note.className = "row-note";
        note.textContent = `${items.length} film`;
        const rail = document.createElement("div");
        rail.className = "rail";
        head.append(title, note);
        section.append(head, rail);
        rows.appendChild(section);
        renderRail(rail, items);
      });
    }
    initHome().catch(() => {
      document.querySelector("[data-hero-copy]").textContent = "Arşiv verisi alınamadı. Veri kaynağı bağlantısını kontrol edin.";
    });
  </script>
</body>
</html>
